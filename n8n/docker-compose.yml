services:
  n8n:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-UTC}
      - TZ=${GENERIC_TIMEZONE:-UTC}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # Re-enable ExecuteCommand and LocalFileTrigger (disabled by default in n8n v2+)
      # Setting NODES_EXCLUDE to empty array overrides the v2 blocklist
      - NODES_EXCLUDE=[]
      # Allow ReadWriteFile node to access /watch_folder
      - N8N_RESTRICT_FILE_ACCESS_TO=/watch_folder;/pipeline;/home/node/.n8n-files
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
    volumes:
      # Persistent n8n data (workflows, credentials, execution history)
      - ./n8n-data:/home/node/.n8n
      # Pipeline code (read-only)
      - ../ingestion:/pipeline/ingestion:ro
      - ../run.py:/pipeline/run.py:ro
      - ../requirements.txt:/pipeline/requirements.txt:ro
      - ../.env:/pipeline/.env:ro
      # Shared watch folder (read-write — pipeline writes outputs here)
      - ../watch_folder:/watch_folder
